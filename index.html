<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowPlan Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <p class="eyebrow">FlowPlan</p>
          <h1>Week</h1>
          <p class="subtle" id="sidebar-range">This week</p>
        </div>

        <section class="sidebar-card">
          <div class="card-header">
            <div>
              <p class="eyebrow">Focus</p>
              <h2>Currently doing</h2>
            </div>
          </div>
          <div class="focus-panel">
            <strong id="current-focus-title">Nothing checked yet</strong>
            <p id="current-focus-meta">
              Mark any calendar block as your current focus.
            </p>
          </div>
        </section>

        <section class="sidebar-card">
          <div class="card-header">
            <div>
              <p class="eyebrow">Quick Add</p>
              <h2>Schedule a block</h2>
            </div>
          </div>

          <form id="planner-form" class="planner-form">
            <label>
              Title
              <input
                id="entry-title"
                name="title"
                type="text"
                maxlength="90"
                placeholder="Homework, gym, call..."
                required
              />
            </label>

            <label>
              Notes
              <textarea
                id="entry-notes"
                name="notes"
                rows="3"
                maxlength="220"
                placeholder="Optional"
              ></textarea>
            </label>

            <div class="field-grid">
              <label>
                Day
                <select id="entry-day" name="day"></select>
              </label>
              <label>
                Hour
                <select id="entry-hour" name="hour"></select>
              </label>
            </div>

            <fieldset class="repeat-group">
              <legend>Repeat this week</legend>
              <div id="weekday-pills" class="weekday-pills"></div>
            </fieldset>

            <button type="submit" class="primary-button">Add Block</button>
          </form>
        </section>
      </aside>

      <main class="calendar-app">
        <header class="topbar">
          <div>
            <p class="eyebrow">Planner</p>
            <h2 id="week-label">This week</h2>
          </div>

          <div class="topbar-actions">
            <button type="button" class="ghost-button" id="prev-week">Previous</button>
            <button type="button" class="ghost-button" id="today-week">Today</button>
            <button type="button" class="ghost-button" id="next-week">Next</button>
          </div>
        </header>

        <section class="calendar-panel">
          <div class="calendar-shell">
            <div class="calendar-header" id="calendar-header"></div>
            <div class="calendar-body">
              <div class="time-column" id="time-column"></div>
              <div class="week-grid" id="week-grid"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <template id="event-card-template">
      <article class="event-card">
        <div class="event-meta">
          <span class="event-hour"></span>
          <div class="event-status">
            <span class="status-dot current-dot"></span>
            <span class="status-dot done-dot"></span>
          </div>
        </div>
        <input class="event-title" type="text" maxlength="90" placeholder="Add what you're doing" />
        <textarea
          class="event-notes"
          rows="2"
          maxlength="220"
          placeholder="Details"
        ></textarea>
        <div class="event-actions">
          <label class="toggle-chip">
            <input type="checkbox" class="doing-toggle" />
            <span>Doing</span>
          </label>
          <label class="toggle-chip">
            <input type="checkbox" class="done-toggle" />
            <span>Done</span>
          </label>
          <button type="button" class="ghost-button compact clear-button">Clear</button>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
